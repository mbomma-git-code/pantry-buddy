<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Planner</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <style>
    :root {
      --page-bg-start: #f0f3ff;
      --page-bg-end: #eceef7;
      --text-main: #222733;
      --text-muted: #7b8090;
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: rgba(255, 255, 255, 0.75);
      --card-shadow: 0 12px 28px rgba(38, 45, 64, 0.09);
      --accent: #3a4462;
      --empty-bg: rgba(248, 249, 253, 0.96);
      --empty-border: #dfe3ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top left, var(--page-bg-start) 0%, var(--page-bg-end) 64%);
      min-height: 100vh;
    }

    .app-shell {
      width: min(1160px, 92vw);
      margin: 22px auto 30px;
      padding: 4px 8px 24px;
    }

    .planner-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .title-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .planner-title {
      margin: 0;
      font-size: clamp(30px, 3.6vw, 48px);
      font-weight: 600;
      letter-spacing: 0.15px;
    }

    .title-icon {
      width: 34px;
      height: 34px;
      border: 2px solid #2f374f;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #2f374f;
      background: rgba(255, 255, 255, 0.72);
    }

    .planner-subtitle {
      margin: 9px 0 8px;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
    }

    .week-label {
      margin: 0;
      color: #757c8f;
      font-size: 15px;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      margin: 12px 0 0;
    }

    .generate-btn {
      border: 0;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(180deg, #4a5b8e, #354571);
      color: #fff;
      box-shadow: 0 8px 18px rgba(50, 62, 106, 0.2);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .generate-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .generate-btn:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(50, 62, 106, 0.3);
    }

    .status {
      text-align: center;
      margin-top: 11px;
      min-height: 22px;
      color: #8a3f3f;
      font-size: 14px;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(255px, 1fr));
      gap: 18px;
      align-items: stretch;
      margin-top: 14px;
    }

    .day-card {
      border-radius: 17px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--card-shadow);
      padding: 16px 16px 16px;
      backdrop-filter: blur(3px);
      min-height: 328px;
    }

    .day-name {
      margin: 0;
      text-align: center;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    .day-date {
      margin: 2px 0 14px;
      text-align: center;
      color: #888d9a;
      font-size: 16px;
      font-weight: 400;
    }

    .meal-row + .meal-row {
      margin-top: 9px;
    }

    .meal-row-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #2a3041;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .meal-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 500;
    }

    .meal-icon {
      color: #8d93a3;
      font-size: 13px;
      line-height: 1;
      transform: translateY(-0.5px);
    }

    .plus-icon {
      color: #2f384f;
      font-size: 23px;
      font-weight: 300;
      line-height: 1;
      user-select: none;
    }

    .meal-value {
      border: 1px dashed var(--empty-border);
      border-radius: 9px;
      min-height: 33px;
      padding: 7px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--empty-bg);
      color: #8a8f9d;
      font-size: 12px;
      font-weight: 500;
    }

    .meal-value.has-recipe {
      border-style: solid;
      border-color: #d2d9ec;
      background: #f4f7ff;
      color: #394465;
    }

    @media (max-width: 950px) {
      .week-grid {
        grid-template-columns: repeat(2, minmax(230px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(96vw, 560px);
      }

      .planner-subtitle {
        font-size: 14px;
      }

      .week-label {
        font-size: 14px;
      }

      .meal-row-header {
        font-size: 15px;
      }

      .meal-value {
        font-size: 12px;
      }

      .week-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="config.js?v=20260317v1"></script>
  <script type="text/babel" src="app.js?v=20260317v1"></script>
</body>
</html>
